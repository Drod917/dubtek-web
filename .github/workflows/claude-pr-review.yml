name: Claude PR Review

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request (#${{ github.event.pull_request.number }}) as a senior
            engineer would. Read the diff with
            `gh pr diff ${{ github.event.pull_request.number }}`, check changed files against this
            repo's CLAUDE.md conventions (Tailwind design tokens, existing component patterns,
            Astro architecture), and look for correctness bugs, security issues, and
            inconsistencies with the rest of the codebase.

            For any finding tied to a specific file and line — a bug, a security issue, a
            convention mismatch — use the `create_inline_comment` tool with the exact `path` and
            `line` instead of describing the location in prose. Reserve the overall review body
            for a short summary; if you left inline comments, say so there rather than repeating
            file:line detail.

            Post your overall verdict as a single PR review:
            - If you found issues worth the author's attention, run
              `gh pr review ${{ github.event.pull_request.number }} --comment -b "<summary>"`.
            - If the change looks correct, safe, and consistent with repo conventions, you may
              approve it with
              `gh pr review ${{ github.event.pull_request.number }} --approve -b "<short reason>"`.
            - Under no circumstances run `gh pr review --request-changes`, and do not modify any
              files, commit, or push. Your only output is inline comments plus the review you
              post via `gh`.

            Keep both inline comments and the summary concise and specific, and skip commentary
            on generated placeholders explicitly called out in CLAUDE.md (og-cover.svg,
            favicon.svg, CSS-gradient project placeholders) unless they're directly relevant to
            the change.
          claude_args: |
            --model claude-sonnet-5
            --max-turns 10
            --allowedTools "Read,Grep,Glob,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh pr review ${{ github.event.pull_request.number }} --comment:*),Bash(gh pr review ${{ github.event.pull_request.number }} --approve:*),mcp__github_inline_comment__create_inline_comment"
            --disallowedTools "Bash(gh pr review ${{ github.event.pull_request.number }} --request-changes:*),Bash(git push:*),Bash(git commit:*),Edit,Write"
